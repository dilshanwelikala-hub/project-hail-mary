<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invite · TaskBoard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: white; border-radius: 14px; padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    h1 { font-size: 1.4rem; margin-bottom: .25rem; color: #1a1a2e; }
    p  { color: #6b7280; font-size: .88rem; margin-bottom: 1.5rem; }
    .team-badge { background: #eff6ff; color: #1d4ed8; font-weight: 700; padding: .3rem .75rem; border-radius: 6px; font-size: .88rem; display: inline-block; margin-bottom: 1.25rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: .3rem; }
    input { width: 100%; padding: .6rem .75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: .9rem; margin-bottom: .9rem; font-family: inherit; }
    input:disabled { background: #f9fafb; color: #6b7280; }
    button { width: 100%; padding: .7rem; background: #4f8ef7; color: white; border: none; border-radius: 6px; font-size: .95rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #3a7ae0; }
    .msg { font-size: .85rem; padding: .65rem .9rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
    .msg.success { background: #dcfce7; color: #15803d; }
    .msg.error   { background: #fee2e2; color: #b91c1c; }
    .back { display: block; text-align: center; margin-top: 1rem; font-size: .85rem; color: #4f8ef7; text-decoration: none; }
    #loading { text-align: center; color: #6b7280; font-size: .9rem; }
  </style>
</head>
<body>
<div class="box">
  <div id="loading">Validating invite…</div>
  <div id="content" style="display:none">
    <h1>✉️ You're Invited!</h1>
    <p>You've been invited to join a team on TaskBoard.</p>
    <div class="team-badge" id="team-name"></div>
    <div class="msg" id="msg"></div>
    <div id="form">
      <label>Your Name</label>
      <input type="text"     id="name"     placeholder="Your name" />
      <label>Email</label>
      <input type="email"    id="email"    disabled />
      <label>Password</label>
      <input type="password" id="password" placeholder="Create a password" />
      <button onclick="acceptInvite()">Join Team</button>
    </div>
  </div>
  <a class="back" href="/">← Back to TaskBoard</a>
</div>
<script>
  const API   = 'https://project-hail-mary-kf08.onrender.com';
  const token = new URLSearchParams(window.location.search).get('token');

  async function init() {
    if (!token) { showMsg('Invalid invite link.', 'error'); return; }
    const res  = await fetch(`${API}/api/invite/${token}`);
    const data = await res.json();
    document.getElementById('loading').style.display  = 'none';
    document.getElementById('content').style.display  = '';
    if (!res.ok) { showMsg(data.error || 'Invalid or expired invite.', 'error'); document.getElementById('form').style.display='none'; return; }
    document.getElementById('team-name').textContent = '🏢 ' + data.teamName;
    document.getElementById('email').value = data.email;
  }

  async function acceptInvite() {
    const name     = document.getElementById('name').value.trim();
    const password = document.getElementById('password').value;
    if (!name)     return showMsg('Name is required.', 'error');
    if (!password) return showMsg('Password is required.', 'error');
    if (password.length < 6) return showMsg('Password must be at least 6 characters.', 'error');

    const res  = await fetch(`${API}/api/invite/${token}/accept`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, password }),
    });
    const data = await res.json();
    if (!res.ok) return showMsg(data.error || 'Failed to accept invite.', 'error');

    sessionStorage.setItem('tb_token', data.token);
    sessionStorage.setItem('tb_user',  JSON.stringify(data.user));
    showMsg('Welcome to the team! Redirecting…', 'success');
    document.getElementById('form').style.display = 'none';
    setTimeout(() => window.location.href = '/', 1500);
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = `msg ${type}`;
    el.style.display = 'block';
  }

  init();
</script>
</body>
</html>
