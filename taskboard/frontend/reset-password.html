<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · TaskBoard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: white; border-radius: 14px; padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    h1 { font-size: 1.4rem; margin-bottom: .25rem; color: #1a1a2e; }
    p  { color: #6b7280; font-size: .88rem; margin-bottom: 1.5rem; }
    label { display: block; font-size: .82rem; font-weight: 600; color: #374151; margin-bottom: .3rem; }
    input { width: 100%; padding: .6rem .75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: .9rem; margin-bottom: .9rem; font-family: inherit; }
    button { width: 100%; padding: .7rem; background: #4f8ef7; color: white; border: none; border-radius: 6px; font-size: .95rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #3a7ae0; }
    .msg { font-size: .85rem; padding: .65rem .9rem; border-radius: 6px; margin-bottom: 1rem; display: none; }
    .msg.success { background: #dcfce7; color: #15803d; }
    .msg.error   { background: #fee2e2; color: #b91c1c; }
    .back { display: block; text-align: center; margin-top: 1rem; font-size: .85rem; color: #4f8ef7; text-decoration: none; }
  </style>
</head>
<body>
<div class="box">
  <h1>🔑 Reset Password</h1>
  <p id="subtitle">Enter your new password below.</p>
  <div class="msg" id="msg"></div>
  <div id="form">
    <label>New Password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <label>Confirm Password</label>
    <input type="password" id="confirm"  placeholder="••••••••" />
    <button onclick="resetPassword()">Set New Password</button>
  </div>
  <a class="back" href="/">← Back to TaskBoard</a>
</div>
<script>
  const API   = 'https://project-hail-mary-kf08.onrender.com';
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) showMsg('Invalid reset link.', 'error');

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    if (!password) return showMsg('Password is required.', 'error');
    if (password !== confirm) return showMsg('Passwords do not match.', 'error');
    if (password.length < 6)  return showMsg('Password must be at least 6 characters.', 'error');

    const res  = await fetch(`${API}/api/auth/reset-password`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await res.json();
    if (!res.ok) return showMsg(data.error || 'Failed to reset password.', 'error');

    document.getElementById('form').style.display = 'none';
    showMsg('Password updated! You can now sign in.', 'success');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className   = `msg ${type}`;
    el.style.display = 'block';
  }
</script>
</body>
</html>
